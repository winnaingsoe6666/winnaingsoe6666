<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 120" width="100%" height="120">
  <defs>
    <linearGradient id="grad" x1="0" x2="1000">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title {
        font: 700 26px monospace;
        fill: #e2e8f0;
        letter-spacing: 3px;
      }
      .sub {
        font: 400 12px monospace;
        fill: #64748b;
        letter-spacing: 2px;
      }
    </style>
  </defs>

  <!-- lines -->
  <line x1="0" y1="60" x2="400" y2="60" stroke="#1e293b" stroke-width="2"/>
  <line x1="600" y1="60" x2="1000" y2="60" stroke="#1e293b" stroke-width="2"/>

  <!-- animated energy -->
  <line x1="0" y1="60" x2="1000" y2="60"
        stroke="url(#grad)" stroke-width="2"
        stroke-dasharray="120 1400">
    <animate attributeName="stroke-dashoffset"
             values="1520;0"
             dur="3s"
             repeatCount="indefinite"/>
  </line>

  <!-- center node -->
  <g transform="translate(500,60)" filter="url(#glow)">
    <circle r="14" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <circle r="6" fill="#22d3ee"/>
    <animateTransform attributeName="transform"
                      type="rotate"
                      from="0 500 60"
                      to="360 500 60"
                      dur="6s"
                      repeatCount="indefinite"/>
  </g>

  <!-- text -->
  <text x="500" y="40" text-anchor="middle" class="title">
    SYSTEM ACCESS
  </text>

  <text x="500" y="95" text-anchor="middle" class="sub">
    entry points • external systems • interfaces
  </text>

</svg>