<svg width="1400" height="640" viewBox="0 0 1400 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0b1024"/>
    </linearGradient>

    <linearGradient id="goodEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>

    <linearGradient id="poorEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="52%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>

    <linearGradient id="outerFlow" x1="0" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="24%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.85"/>
      <stop offset="76%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-180 0;180 0;-180 0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>

    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.24"/>
      <stop offset="48%" stop-color="#8b5cf6" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#38bdf8" stroke-opacity="0.045" stroke-width="1">
        <animateTransform attributeName="transform" type="translate" values="0 0;42 42;0 0" dur="28s" repeatCount="indefinite"/>
      </path>
    </pattern>

    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="145%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.62"/>
    </filter>

    <style>
      .kicker {
        font: 800 14px 'Segoe UI', Arial, sans-serif;
        letter-spacing: 5px;
        fill: #67e8f9;
      }
      .title {
        font: 900 44px 'Segoe UI', Arial, sans-serif;
        letter-spacing: 2px;
        fill: #f8fafc;
      }
      .subtitle {
        font: 600 17px 'Segoe UI', Arial, sans-serif;
        fill: #94a3b8;
      }
      .panelTitle {
        font: 900 31px 'Segoe UI', Arial, sans-serif;
        letter-spacing: 1px;
        fill: #f8fafc;
      }
      .panelMeta {
        font: 800 12px 'Segoe UI', Arial, sans-serif;
        letter-spacing: 4px;
      }
      .item {
        font: 650 17px 'Segoe UI', Arial, sans-serif;
        fill: #dbeafe;
      }
      .itemDim {
        font: 650 17px 'Segoe UI', Arial, sans-serif;
        fill: #fecaca;
      }
      .terminal {
        font: 800 15px 'Cascadia Mono', Consolas, monospace;
        fill: #bbf7d0;
      }
      .small {
        font: 650 14px 'Segoe UI', Arial, sans-serif;
        fill: #94a3b8;
      }
    </style>
  </defs>

  <rect width="1400" height="640" rx="34" fill="url(#bg)"/>
  <rect width="1400" height="640" rx="34" fill="url(#grid)"/>
  <circle cx="700" cy="326" r="290" fill="url(#centerGlow)">
    <animate attributeName="r" values="260;310;260" dur="9s" repeatCount="indefinite"/>
  </circle>

  <rect x="20" y="20" width="1360" height="600" rx="28" fill="none" stroke="url(#outerFlow)" stroke-width="2.5" stroke-opacity="0.72" stroke-dasharray="440 120" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="0" to="-560" dur="20s" repeatCount="indefinite"/>
  </rect>

  <text x="700" y="70" text-anchor="middle" class="kicker">COLLABORATION FILTER</text>
  <text x="700" y="121" text-anchor="middle" class="title">GOOD SIGNAL / BAD SIGNAL</text>
  <text x="700" y="153" text-anchor="middle" class="subtitle">A quick read on whether a collaboration is ready for serious technical work.</text>

  <g filter="url(#panelShadow)">
    <rect x="70" y="205" width="575" height="330" rx="24" fill="rgba(2, 6, 23, 0.78)" stroke="url(#goodEdge)" stroke-width="2.5"/>
    <rect x="755" y="205" width="575" height="330" rx="24" fill="rgba(2, 6, 23, 0.78)" stroke="url(#poorEdge)" stroke-width="2.5"/>
  </g>

  <g transform="translate(70 205)">
    <rect x="0" y="0" width="575" height="330" rx="24" fill="none" stroke="url(#goodEdge)" stroke-width="2" stroke-opacity="0.55" stroke-dasharray="240 72" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="-312" dur="18s" repeatCount="indefinite"/>
    </rect>
    <text x="34" y="46" class="panelMeta" fill="#86efac">ACCEPT SIGNAL</text>
    <text x="34" y="91" class="panelTitle">GOOD FIT</text>

    <g filter="url(#glow)">
      <circle cx="508" cy="62" r="26" fill="none" stroke="#22c55e" stroke-width="3"/>
      <path d="M496 62L505 71L522 51" fill="none" stroke="#86efac" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <g transform="translate(34 130)">
      <circle cx="8" cy="0" r="5" fill="#22d3ee"/>
      <text x="28" y="6" class="item">A repo, demo, diagram, or technical note exists.</text>

      <circle cx="8" cy="44" r="5" fill="#22c55e"/>
      <text x="28" y="50" class="item">The problem has constraints and tradeoffs.</text>

      <circle cx="8" cy="88" r="5" fill="#a7f3d0"/>
      <text x="28" y="94" class="item">The first step can be scoped.</text>

      <circle cx="8" cy="132" r="5" fill="#22d3ee"/>
      <text x="28" y="138" class="item">Security, privacy, and data boundaries are explicit.</text>

      <circle cx="8" cy="176" r="5" fill="#22c55e"/>
      <text x="28" y="182" class="item">The project values maintainability.</text>
    </g>
  </g>

  <g transform="translate(755 205)">
    <rect x="0" y="0" width="575" height="330" rx="24" fill="none" stroke="url(#poorEdge)" stroke-width="2" stroke-opacity="0.5" stroke-dasharray="240 72" stroke-linecap="round">
      <animate attributeName="stroke-dashoffset" from="0" to="-312" dur="22s" repeatCount="indefinite"/>
    </rect>
    <text x="34" y="46" class="panelMeta" fill="#fca5a5">REJECT SIGNAL</text>
    <text x="34" y="91" class="panelTitle">POOR FIT</text>

    <g filter="url(#glow)">
      <circle cx="508" cy="62" r="26" fill="none" stroke="#f43f5e" stroke-width="3"/>
      <path d="M496 50L520 74M520 50L496 74" fill="none" stroke="#fecaca" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g transform="translate(34 130)">
      <circle cx="8" cy="0" r="5" fill="#f43f5e"/>
      <text x="28" y="6" class="itemDim">The idea is only "we should use AI for X."</text>

      <circle cx="8" cy="44" r="5" fill="#f59e0b"/>
      <text x="28" y="50" class="itemDim">The goal is mostly hype, views, or a vague pitch.</text>

      <circle cx="8" cy="88" r="5" fill="#a855f7"/>
      <text x="28" y="94" class="itemDim">The ask is to build a full product from nothing.</text>

      <circle cx="8" cy="132" r="5" fill="#f43f5e"/>
      <text x="28" y="138" class="itemDim">Private data or credentials are treated casually.</text>

      <circle cx="8" cy="176" r="5" fill="#f59e0b"/>
      <text x="28" y="182" class="itemDim">The project only cares about a short demo.</text>
    </g>
  </g>

  <g transform="translate(352 564)">
    <rect width="696" height="44" rx="22" fill="rgba(2, 6, 23, 0.78)" stroke="url(#outerFlow)" stroke-width="1.5" stroke-opacity="0.6"/>
    <text x="28" y="28" class="terminal">&gt; prefer: scoped milestones, real constraints, inspectable systems</text>
  </g>
</svg>
