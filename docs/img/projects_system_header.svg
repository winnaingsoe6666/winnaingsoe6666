<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="100%" height="320">
  <defs>

    <!-- Background -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="70%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Core gradient -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="25%" stop-color="#67e8f9"/>
      <stop offset="65%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Scanline effect -->
    <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="2" fill="rgba(255,255,255,0.02)"/>
    </pattern>

    <style>
      .title {
        font: 700 36px 'Segoe UI', Arial, sans-serif;
        fill: url(#titleGrad);
        letter-spacing: 3px;
      }

      .subtitle {
        font: 500 14px 'Segoe UI', Arial, sans-serif;
        fill: #94a3b8;
        letter-spacing: 2px;
      }

      .system {
        font: 600 12px 'Segoe UI', Arial, sans-serif;
        fill: #22d3ee;
        letter-spacing: 2px;
      }

      .line {
        stroke: #1e293b;
        stroke-width: 2;
      }
    </style>

  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bgGrad)"/>
  <rect width="1200" height="320" fill="url(#scanlines)" opacity="0.4"/>

  <!-- Central core -->
  <g transform="translate(600 150)">
    <circle r="70" fill="url(#coreGrad)" filter="url(#glow)">
      <animate attributeName="r" values="65;80;65" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle r="30" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Orbit rings -->
  <g transform="translate(600 150)" opacity="0.6">
    <circle r="110" fill="none" stroke="#22d3ee" stroke-opacity="0.2" stroke-width="2"
            stroke-dasharray="8 16">
      <animateTransform attributeName="transform" type="rotate"
        from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </circle>

    <circle r="140" fill="none" stroke="#8b5cf6" stroke-opacity="0.2" stroke-width="2"
            stroke-dasharray="6 18">
      <animateTransform attributeName="transform" type="rotate"
        from="360" to="0" dur="28s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Side lines -->
  <line x1="80" y1="150" x2="460" y2="150" class="line"/>
  <line x1="740" y1="150" x2="1120" y2="150" class="line"/>

  <!-- Small system nodes -->
  <g filter="url(#glow)">
    <circle cx="460" cy="150" r="6" fill="#22d3ee"/>
    <circle cx="740" cy="150" r="6" fill="#8b5cf6"/>
  </g>

  <!-- Animated signal -->
  <circle r="4" fill="#ffffff">
    <animateMotion dur="3s" repeatCount="indefinite"
      path="M460,150 C520,140 560,140 600,150"/>
  </circle>

  <circle r="4" fill="#67e8f9">
    <animateMotion dur="3.5s" repeatCount="indefinite"
      path="M600,150 C640,160 680,160 740,150"/>
  </circle>

  <!-- Title -->
  <text x="600" y="240" text-anchor="middle" class="title">
    PROJECT SYSTEMS
  </text>

  <!-- Subtitle -->
  <text x="600" y="265" text-anchor="middle" class="subtitle">
    ACTIVE ML SYSTEMS • INFRASTRUCTURE • EXPERIMENTAL ARCHITECTURES
  </text>

  <!-- System label -->
  <text x="600" y="40" text-anchor="middle" class="system">
    SYSTEM ACCESS: PROJECT MODULES
  </text>

</svg>