<svg width="1400" height="680" viewBox="0 0 1400 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0b1024"/>
    </linearGradient>

    <linearGradient id="flow" x1="0" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="24%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="52%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="78%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-180 0;180 0;-180 0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="nodeEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="42%" r="58%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="52%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#38bdf8" stroke-opacity="0.045">
        <animateTransform attributeName="transform" type="translate" values="0 0;40 40;0 0" dur="28s" repeatCount="indefinite"/>
      </path>
    </pattern>

    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-16%" y="-18%" width="132%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.58"/>
    </filter>

    <style>
      .kicker {
        font: 800 14px 'Segoe UI', Arial, sans-serif;
        letter-spacing: 5px;
        fill: #67e8f9;
      }
      .title {
        font: 900 44px 'Segoe UI', Arial, sans-serif;
        letter-spacing: 2px;
        fill: #f8fafc;
      }
      .subtitle {
        font: 600 17px 'Segoe UI', Arial, sans-serif;
        fill: #94a3b8;
      }
      .nodeTitle {
        font: 900 22px 'Segoe UI', Arial, sans-serif;
        fill: #f8fafc;
      }
      .nodeText {
        font: 650 15px 'Segoe UI', Arial, sans-serif;
        fill: #cbd5e1;
      }
      .meta {
        font: 800 11px 'Segoe UI', Arial, sans-serif;
        letter-spacing: 3px;
        fill: #67e8f9;
      }
      .terminal {
        font: 800 15px 'Cascadia Mono', Consolas, monospace;
        fill: #bbf7d0;
      }
      .step {
        font: 800 13px 'Segoe UI', Arial, sans-serif;
        letter-spacing: 2px;
        fill: #dbeafe;
      }
    </style>
  </defs>

  <rect width="1400" height="680" rx="34" fill="url(#bg)"/>
  <rect width="1400" height="680" rx="34" fill="url(#grid)"/>
  <circle cx="700" cy="330" r="360" fill="url(#coreGlow)">
    <animate attributeName="r" values="330;380;330" dur="10s" repeatCount="indefinite"/>
  </circle>

  <rect x="20" y="20" width="1360" height="640" rx="28" fill="none" stroke="url(#flow)" stroke-width="2.5" stroke-opacity="0.72" stroke-dasharray="440 140" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="0" to="-580" dur="22s" repeatCount="indefinite"/>
  </rect>

  <text x="700" y="70" text-anchor="middle" class="kicker">OPERATING STYLE</text>
  <text x="700" y="122" text-anchor="middle" class="title">HOW THE WORK MOVES</text>
  <text x="700" y="155" text-anchor="middle" class="subtitle">A collaboration rhythm built around clarity, ownership, reproducibility, and useful artifacts.</text>

  <g transform="translate(150 200)" filter="url(#glow)">
    <path d="M0 0H1100" stroke="url(#flow)" stroke-width="3" stroke-linecap="round" stroke-dasharray="24 18">
      <animate attributeName="stroke-dashoffset" from="0" to="-168" dur="10s" repeatCount="indefinite"/>
    </path>
    <circle cx="0" cy="0" r="7" fill="#22d3ee"/>
    <circle cx="220" cy="0" r="7" fill="#8b5cf6"/>
    <circle cx="440" cy="0" r="7" fill="#22c55e"/>
    <circle cx="660" cy="0" r="7" fill="#22d3ee"/>
    <circle cx="880" cy="0" r="7" fill="#8b5cf6"/>
    <circle cx="1100" cy="0" r="7" fill="#22c55e"/>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(80 235)">
      <rect width="380" height="132" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#nodeEdge)" stroke-width="2"/>
      <rect width="380" height="132" rx="20" fill="none" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="210 64" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="0" to="-274" dur="18s" repeatCount="indefinite"/>
      </rect>
      <text x="28" y="38" class="meta">01 / SIGNAL</text>
      <text x="28" y="72" class="nodeTitle">DIRECT COMMS</text>
      <text x="28" y="101" class="nodeText">Clear technical language and fast clarification.</text>
    </g>

    <g transform="translate(510 235)">
      <rect width="380" height="132" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#nodeEdge)" stroke-width="2"/>
      <rect width="380" height="132" rx="20" fill="none" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="210 64" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="0" to="-274" dur="20s" repeatCount="indefinite"/>
      </rect>
      <text x="28" y="38" class="meta">02 / OWNERSHIP</text>
      <text x="28" y="72" class="nodeTitle">DECISION RIGHTS</text>
      <text x="28" y="101" class="nodeText">Tasks, tradeoffs, and decisions have owners.</text>
    </g>

    <g transform="translate(940 235)">
      <rect width="380" height="132" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#nodeEdge)" stroke-width="2"/>
      <rect width="380" height="132" rx="20" fill="none" stroke="#22c55e" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="210 64" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="0" to="-274" dur="19s" repeatCount="indefinite"/>
      </rect>
      <text x="28" y="38" class="meta">03 / MILESTONES</text>
      <text x="28" y="72" class="nodeTitle">SMALL FIRST STEPS</text>
      <text x="28" y="101" class="nodeText">Prove direction before expanding scope.</text>
    </g>

    <g transform="translate(80 405)">
      <rect width="380" height="132" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#nodeEdge)" stroke-width="2"/>
      <rect width="380" height="132" rx="20" fill="none" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="210 64" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="0" to="-274" dur="21s" repeatCount="indefinite"/>
      </rect>
      <text x="28" y="38" class="meta">04 / REPRODUCE</text>
      <text x="28" y="72" class="nodeTitle">NO MAGIC SCRIPTS</text>
      <text x="28" y="101" class="nodeText">Prefer repeatable systems over one-offs.</text>
    </g>

    <g transform="translate(510 405)">
      <rect width="380" height="132" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#nodeEdge)" stroke-width="2"/>
      <rect width="380" height="132" rx="20" fill="none" stroke="#8b5cf6" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="210 64" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="0" to="-274" dur="18s" repeatCount="indefinite"/>
      </rect>
      <text x="28" y="38" class="meta">05 / INTERFACES</text>
      <text x="28" y="72" class="nodeTitle">DOCS &amp; DIAGRAMS</text>
      <text x="28" y="101" class="nodeText">Make systems inspectable and teachable.</text>
    </g>

    <g transform="translate(940 405)">
      <rect width="380" height="132" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#nodeEdge)" stroke-width="2"/>
      <rect width="380" height="132" rx="20" fill="none" stroke="#22c55e" stroke-opacity="0.4" stroke-width="2" stroke-dasharray="210 64" stroke-linecap="round">
        <animate attributeName="stroke-dashoffset" from="0" to="-274" dur="20s" repeatCount="indefinite"/>
      </rect>
      <text x="28" y="38" class="meta">06 / STANDARD</text>
      <text x="28" y="72" class="nodeTitle">HIGH BAR, LOW NOISE</text>
      <text x="28" y="101" class="nodeText">Strong standards without unnecessary ceremony.</text>
    </g>
  </g>

  <g transform="translate(330 584)">
    <rect width="740" height="44" rx="22" fill="rgba(2, 6, 23, 0.82)" stroke="url(#flow)" stroke-width="1.5" stroke-opacity="0.58"/>
    <text x="34" y="28" class="terminal">&gt; collaboration loop: clarify -> own -> build -> verify -> document</text>
  </g>
</svg>
