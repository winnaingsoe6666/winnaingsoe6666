<svg viewBox="0 0 500 650" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- background -->
    <radialGradient id="bg">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- core -->
    <radialGradient id="core">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#67e8f9"/>
      <stop offset="65%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <!-- links -->
    <linearGradient id="link">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.1"/>
    </linearGradient>

    <!-- glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20"/>
    </filter>

    <!-- warp -->
    <filter id="warp">
      <feTurbulence baseFrequency="0.01" numOctaves="2" seed="3">
        <animate attributeName="baseFrequency"
          values="0.01;0.015;0.01"
          dur="10s"
          repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="8"/>
    </filter>

    <style>
      .label { font: 600 12px 'Segoe UI'; fill:#e2e8f0; }
      .title { font:700 26px 'Segoe UI'; fill:#e2e8f0; letter-spacing:2px;}
    </style>

  </defs>

  <!-- background -->
  <rect width="500" height="650" fill="url(#bg)"/>

  <!-- ambient field -->
  <g filter="url(#bigGlow)" opacity="0.5">
    <circle cx="250" cy="320" r="200" fill="#22d3ee" opacity="0.05">
      <animate attributeName="r" values="180;220;180" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="320" r="150" fill="#8b5cf6" opacity="0.06">
      <animate attributeName="r" values="130;170;130" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- main system -->
  <g transform="translate(250 320)" filter="url(#warp)">

    <!-- rotating field -->
    <ellipse rx="200" ry="120" fill="none" stroke="#22d3ee" stroke-opacity="0.2" stroke-dasharray="6 18">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="30s" repeatCount="indefinite"/>
    </ellipse>

    <ellipse rx="120" ry="210" fill="none" stroke="#8b5cf6" stroke-opacity="0.2" stroke-dasharray="4 20">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="24s" repeatCount="indefinite"/>
    </ellipse>

    <!-- neural-style mesh -->
    <g stroke="url(#link)" stroke-width="2.2" stroke-linecap="round">

      <line x1="-40" y1="-60" x2="0" y2="0"/>
      <line x1="0" y1="0" x2="80" y2="-40"/>
      <line x1="0" y1="0" x2="100" y2="90"/>
      <line x1="0" y1="0" x2="-90" y2="110"/>
      <line x1="0" y1="0" x2="-120" y2="-70"/>

    </g>

    <!-- signal streams -->
    <circle r="3" fill="#ffffff">
      <animateMotion dur="2.4s" repeatCount="indefinite"
        path="M0,0 C0,-80 0,-140 0,-200"/>
    </circle>

    <circle r="3" fill="#67e8f9">
      <animateMotion dur="3s" repeatCount="indefinite"
        path="M0,0 C60,-20 100,-40 140,-70"/>
    </circle>

    <circle r="3" fill="#c4b5fd">
      <animateMotion dur="2.8s" repeatCount="indefinite"
        path="M0,0 C80,50 120,80 160,120"/>
    </circle>

    <!-- core -->
    <g filter="url(#glow)">
      <circle r="80" fill="url(#core)">
        <animate attributeName="r" values="70;95;70" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle r="30" fill="#ffffff"/>
    </g>

    <!-- nodes -->
    <g filter="url(#glow)">
      <circle cx="0" cy="-200" r="16" fill="#67e8f9"/>
      <circle cx="140" cy="-70" r="14" fill="#8b5cf6"/>
      <circle cx="160" cy="120" r="14" fill="#8b5cf6"/>
      <circle cx="0" cy="210" r="16" fill="#67e8f9"/>
      <circle cx="-140" cy="120" r="14" fill="#8b5cf6"/>
      <circle cx="-120" cy="-70" r="14" fill="#8b5cf6"/>
    </g>

  </g>

  <!-- background particles -->
  <g opacity="0.6" filter="url(#glow)">
    <circle cx="80" cy="200" r="2">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="240" r="2.5" fill="#67e8f9">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="580" r="2" fill="#c4b5fd">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- labels -->
  <text x="250" y="80" text-anchor="middle" class="label">ML / DL</text>
  <text x="410" y="250" class="label">GenAI</text>
  <text x="420" y="500" class="label">Multi-Agent</text>
  <text x="250" y="620" text-anchor="middle" class="label">RL</text>
  <text x="40" y="500" class="label">MLOps</text>
  <text x="40" y="250" class="label">Robotics</text>

  <!-- title -->
  <text x="250" y="45" text-anchor="middle" class="title">
    AI DOMAINS
  </text>

</svg>