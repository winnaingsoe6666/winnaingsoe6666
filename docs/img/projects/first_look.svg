<svg width="1400" height="560" viewBox="0 0 1400 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0b1024"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="22%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="80%" stop-color="#f472b6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-160 0;160 0;-160 0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="routeEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="48%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glowCore" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#38bdf8" stroke-opacity="0.045">
        <animateTransform attributeName="transform" type="translate" values="0 0;40 40;0 0" dur="28s" repeatCount="indefinite"/>
      </path>
    </pattern>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.58"/>
    </filter>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .kicker { font: 800 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 5px; fill: #67e8f9; }
      .title { font: 900 42px 'Segoe UI', Arial, sans-serif; letter-spacing: 2px; fill: #f8fafc; }
      .subtitle { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .routeTitle { font: 900 24px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .routeText { font: 650 15px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .meta { font: 800 11px 'Segoe UI', Arial, sans-serif; letter-spacing: 3px; fill: #67e8f9; }
      .terminal { font: 800 15px 'Cascadia Mono', Consolas, monospace; fill: #bbf7d0; }
    </style>
  </defs>

  <rect width="1400" height="560" rx="34" fill="url(#bg)"/>
  <rect width="1400" height="560" rx="34" fill="url(#grid)"/>
  <circle cx="700" cy="320" r="320" fill="url(#glowCore)">
    <animate attributeName="r" values="290;340;290" dur="10s" repeatCount="indefinite"/>
  </circle>
  <rect x="20" y="20" width="1360" height="520" rx="28" fill="none" stroke="url(#flow)" stroke-width="2.5" stroke-opacity="0.72" stroke-dasharray="430 130" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="0" to="-560" dur="22s" repeatCount="indefinite"/>
  </rect>

  <text x="700" y="70" text-anchor="middle" class="kicker">FIRST LOOK ROUTER</text>
  <text x="700" y="120" text-anchor="middle" class="title">WHAT TO OPEN FIRST</text>
  <text x="700" y="153" text-anchor="middle" class="subtitle">Choose the entry point based on what you care about most.</text>

  <path d="M220 280H1180" stroke="url(#flow)" stroke-width="3" stroke-linecap="round" stroke-dasharray="26 18" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-176" dur="10s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#shadow)">
    <g transform="translate(95 220)">
      <rect width="280" height="200" rx="22" fill="rgba(2, 6, 23, 0.82)" stroke="url(#routeEdge)" stroke-width="2"/>
      <text x="24" y="38" class="meta">AI INFRA / RESEARCH OPS</text>
      <text x="24" y="82" class="routeTitle">PaperOps</text>
      <text x="24" y="120" class="routeText">Start here for research</text>
      <text x="24" y="143" class="routeText">automation, reproducibility,</text>
      <text x="24" y="166" class="routeText">and ML infrastructure.</text>
    </g>
    <g transform="translate(410 220)">
      <rect width="280" height="200" rx="22" fill="rgba(2, 6, 23, 0.82)" stroke="url(#routeEdge)" stroke-width="2"/>
      <text x="24" y="38" class="meta">STRATEGIC AI SYSTEMS</text>
      <text x="24" y="82" class="routeTitle">Future Iran AI</text>
      <text x="24" y="120" class="routeText">Start here for geopolitical</text>
      <text x="24" y="143" class="routeText">AI, intelligence workflows,</text>
      <text x="24" y="166" class="routeText">and long-term research direction.</text>
    </g>
    <g transform="translate(725 220)">
      <rect width="280" height="200" rx="22" fill="rgba(2, 6, 23, 0.82)" stroke="url(#routeEdge)" stroke-width="2"/>
      <text x="24" y="38" class="meta">AGENTS / REASONING</text>
      <text x="24" y="82" class="routeTitle">MARL + Thirty-One</text>
      <text x="24" y="120" class="routeText">Start here for RL, agent</text>
      <text x="24" y="143" class="routeText">behavior, coordination,</text>
      <text x="24" y="166" class="routeText">and decision systems.</text>
    </g>
    <g transform="translate(1040 220)">
      <rect width="280" height="200" rx="22" fill="rgba(2, 6, 23, 0.82)" stroke="url(#routeEdge)" stroke-width="2"/>
      <text x="24" y="38" class="meta">PROFILE / DOC SYSTEMS</text>
      <text x="24" y="82" class="routeTitle">README UX Kit</text>
      <text x="24" y="120" class="routeText">Start here for visual</text>
      <text x="24" y="143" class="routeText">documentation, SVG systems,</text>
      <text x="24" y="166" class="routeText">and GitHub profile design.</text>
    </g>
  </g>

  <g transform="translate(430 475)">
    <rect width="540" height="40" rx="20" fill="rgba(2, 6, 23, 0.82)" stroke="url(#flow)" stroke-width="1.5" stroke-opacity="0.58"/>
    <text x="28" y="26" class="terminal">&gt; choose route by interest, then inspect the repo</text>
  </g>
</svg>
