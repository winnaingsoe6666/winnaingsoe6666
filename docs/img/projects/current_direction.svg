<svg width="1400" height="520" viewBox="0 0 1400 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="50%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0b1024"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="25%" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.9"/>
      <stop offset="82%" stop-color="#22c55e" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-160 0;160 0;-160 0" dur="12s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="cardEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="48%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <radialGradient id="glowCore" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#8b5cf6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#38bdf8" stroke-opacity="0.045">
        <animateTransform attributeName="transform" type="translate" values="0 0;40 40;0 0" dur="28s" repeatCount="indefinite"/>
      </path>
    </pattern>
    <filter id="shadow" x="-16%" y="-18%" width="132%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#020617" flood-opacity="0.58"/>
    </filter>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .kicker { font: 800 14px 'Segoe UI', Arial, sans-serif; letter-spacing: 5px; fill: #67e8f9; }
      .title { font: 900 42px 'Segoe UI', Arial, sans-serif; letter-spacing: 2px; fill: #f8fafc; }
      .subtitle { font: 600 17px 'Segoe UI', Arial, sans-serif; fill: #94a3b8; }
      .cardTitle { font: 900 22px 'Segoe UI', Arial, sans-serif; fill: #f8fafc; }
      .cardText { font: 650 15px 'Segoe UI', Arial, sans-serif; fill: #cbd5e1; }
      .meta { font: 800 11px 'Segoe UI', Arial, sans-serif; letter-spacing: 3px; fill: #67e8f9; }
      .terminal { font: 800 15px 'Cascadia Mono', Consolas, monospace; fill: #bbf7d0; }
    </style>
  </defs>

  <rect width="1400" height="520" rx="34" fill="url(#bg)"/>
  <rect width="1400" height="520" rx="34" fill="url(#grid)"/>
  <circle cx="700" cy="280" r="300" fill="url(#glowCore)">
    <animate attributeName="r" values="270;320;270" dur="10s" repeatCount="indefinite"/>
  </circle>
  <rect x="20" y="20" width="1360" height="480" rx="28" fill="none" stroke="url(#flow)" stroke-width="2.5" stroke-opacity="0.72" stroke-dasharray="430 130" stroke-linecap="round">
    <animate attributeName="stroke-dashoffset" from="0" to="-560" dur="22s" repeatCount="indefinite"/>
  </rect>

  <text x="700" y="68" text-anchor="middle" class="kicker">PROJECT VECTOR</text>
  <text x="700" y="118" text-anchor="middle" class="title">CURRENT DIRECTION</text>
  <text x="700" y="150" text-anchor="middle" class="subtitle">Where the project ecosystem is moving next.</text>

  <path d="M170 205H1230" stroke="url(#flow)" stroke-width="3" stroke-linecap="round" stroke-dasharray="24 18" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-168" dur="10s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#shadow)">
    <g transform="translate(80 235)">
      <rect width="285" height="150" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#cardEdge)" stroke-width="2"/>
      <text x="24" y="38" class="meta">01 / DEMOS</text>
      <text x="24" y="74" class="cardTitle">PUBLIC LABS</text>
      <text x="24" y="105" class="cardText">Build stronger public demos</text>
      <text x="24" y="128" class="cardText">around interactive AI systems.</text>
    </g>
    <g transform="translate(395 235)">
      <rect width="285" height="150" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#cardEdge)" stroke-width="2"/>
      <text x="24" y="38" class="meta">02 / DOCS</text>
      <text x="24" y="74" class="cardTitle">CLEAR REPOS</text>
      <text x="24" y="105" class="cardText">Make each repository explain</text>
      <text x="24" y="128" class="cardText">problem, approach, and next steps.</text>
    </g>
    <g transform="translate(710 235)">
      <rect width="285" height="150" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#cardEdge)" stroke-width="2"/>
      <text x="24" y="38" class="meta">03 / SYSTEM</text>
      <text x="24" y="74" class="cardTitle">CONNECTED HUB</text>
      <text x="24" y="105" class="cardText">Link website, labs, projects,</text>
      <text x="24" y="128" class="cardText">and collaboration paths.</text>
    </g>
    <g transform="translate(1025 235)">
      <rect width="285" height="150" rx="20" fill="rgba(2, 6, 23, 0.8)" stroke="url(#cardEdge)" stroke-width="2"/>
      <text x="24" y="38" class="meta">04 / TRUST</text>
      <text x="24" y="74" class="cardTitle">INSPECTABLE</text>
      <text x="24" y="105" class="cardText">Keep the visual identity strong</text>
      <text x="24" y="128" class="cardText">while making substance easy to audit.</text>
    </g>
  </g>

  <g transform="translate(415 440)">
    <rect width="570" height="40" rx="20" fill="rgba(2, 6, 23, 0.82)" stroke="url(#flow)" stroke-width="1.5" stroke-opacity="0.58"/>
    <text x="28" y="26" class="terminal">&gt; direction: demos -> docs -> hub -> trust</text>
  </g>
</svg>
