<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="100%" height="100">
  <defs>
    <linearGradient id="g-proj" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

      <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>.t{font:600 12px 'Segoe UI'; fill:#e2e8f0; letter-spacing:2px;}</style>
  </defs>

  <!-- base -->
  <!-- Neon animated border -->
    <linearGradient id="borderGradSmall">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
      <animateTransform attributeName="gradientTransform"
        type="translate"
        values="-120 0;120 0;-120 0"
        dur="3s"
        repeatCount="indefinite"/>
    </linearGradient>
      <!-- base fill -->
    <rect x="10" y="20" width="280" height="60" rx="12"
          fill="#020617"/>

    <!-- animated neon border -->
    <rect x="10" y="20" width="280" height="60" rx="12"
          fill="none"
          stroke="url(#borderGradSmall)"
          stroke-width="1.8"
          stroke-dasharray="420"
          stroke-dashoffset="420"
          filter="url(#glow)">
      <animate attributeName="stroke-dashoffset"
               values="420;0"
               dur="2.8s"
               repeatCount="indefinite"/>
    </rect>

  <!-- node grid -->
  <g fill="url(#g-proj)" filter="url(#glow)">
    <circle cx="50" cy="40" r="3">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="60" r="3">
      <animate attributeName="opacity" values="1;0.3;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="40" r="3"/>
  </g>

  <text x="170" y="55" text-anchor="middle" class="t">PROJECTS</text>
</svg>