<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 100" width="100%" height="100">
  <defs>
    <linearGradient id="g-col" x1="0%" x2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .t{font:600 12px 'Segoe UI'; fill:#e2e8f0; letter-spacing:2px;}
    </style>
  </defs>

  <!-- base -->
  <!-- Neon animated border -->
    <linearGradient id="borderGradSmall">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
      <animateTransform attributeName="gradientTransform"
        type="translate"
        values="-120 0;120 0;-120 0"
        dur="3s"
        repeatCount="indefinite"/>
    </linearGradient>
      <!-- base fill -->
    <rect x="10" y="20" width="280" height="60" rx="12"
          fill="#020617"/>

    <!-- animated neon border -->
    <rect x="10" y="20" width="280" height="60" rx="12"
          fill="none"
          stroke="url(#borderGradSmall)"
          stroke-width="1.8"
          stroke-dasharray="420"
          stroke-dashoffset="420"
          filter="url(#glow)">
      <animate attributeName="stroke-dashoffset"
               values="420;0"
               dur="2.8s"
               repeatCount="indefinite"/>
    </rect>

  <!-- connection field -->
  <path d="M50 50 C65 30 75 30 90 50"
        stroke="url(#g-col)" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M50 50 C65 70 75 70 90 50"
        stroke="url(#g-col)" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- nodes -->
  <circle cx="50" cy="50" r="5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="90" cy="50" r="5" fill="#8b5cf6" filter="url(#glow)"/>

  <!-- bidirectional signals -->
  <circle r="3" fill="#ffffff" filter="url(#glow)">
    <animateMotion dur="2s" repeatCount="indefinite"
      path="M50,50 C65,30 75,30 90,50"/>
  </circle>

  <circle r="3" fill="#c4b5fd" filter="url(#glow)">
    <animateMotion dur="2.4s" repeatCount="indefinite"
      path="M90,50 C75,70 65,70 50,50"/>
  </circle>

  <!-- label -->
  <text x="180" y="55" text-anchor="middle" class="t">COLLAB</text>
</svg>